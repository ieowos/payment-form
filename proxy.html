<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата GetTG</title>
    <link rel="stylesheet" href="https://yookassa.ru/integration/simplepay/css/yookassa_construct_form.css?v=1.34.0">
    <style>
        :root {
            --accent: #2563eb;
            --accent-soft: #eff6ff;
            --error: #ef4444;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --bg-page: #f8fafc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        .payment-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            border-radius: 28px;
            box-shadow: 0 15px 35px -5px rgba(0,0,0,0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 20px;
            color: var(--text-dark);
            margin: 0;
            font-weight: 800;
        }

        .presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .preset-btn {
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: white;
            color: var(--text-dark);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn.active {
            border-color: var(--accent);
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .amount-input-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        .custom-amount {
            width: 100%;
            padding: 16px;
            font-size: 22px;
            font-weight: 700;
            border: 2px solid var(--border);
            border-radius: 16px;
            box-sizing: border-box;
            color: var(--text-dark);
            text-align: center;
        }

        .custom-amount:focus {
            outline: none;
            border-color: var(--accent);
        }

        .custom-amount.invalid {
            border-color: var(--error);
            color: var(--error);
        }

        .min-sum-hint {
            display: block;
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 8px;
            font-weight: 500;
        }

        .field-group {
            margin-bottom: 20px;
        }

        .field-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .email-input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn-pay {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-pay:hover {
            background: #1d4ed8;
        }

        .safe-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 24px;
            opacity: 0.5;
        }

        .ym-products, .ym-input-icon-rub, .ym-payment-btn-block {
            opacity: 0;
            position: absolute;
            pointer-events: none;
            height: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <div class="header">
            <h1>💰 Пополнение GetTG</h1>
        </div>

        <form class="yoomoney-payment-form" action="https://yookassa.ru/integration/simplepay/payment" method="post" id="payForm">

            <div class="ym-products">
                <div class="ym-product">
                    <input type="hidden" name="text" value="Пополнение GetTG">
                    <input type="hidden" name="price" id="priceInput" value="60">
                    <input type="hidden" name="quantity" value="1">
                    <input type="hidden" name="paymentSubjectType" value="payment">
                    <input type="hidden" name="paymentMethodType" value="full_prepayment">
                    <input type="hidden" name="tax" value="1">
                </div>
            </div>

            <input type="hidden" name="ym_merchant_receipt" value="">
            <input type="hidden" name="shopId" value="1301126">
            <input type="hidden" name="sum" id="sumInput" value="60">

            <!-- ИСПРАВЛЕНО: правильный формат для передачи metadata в ЮKassa Simplepay -->
            <input type="hidden" name="metadata[user_id]" id="metadataUserIdInput" value="">

            <!-- customerNumber для совместимости -->
            <input type="hidden" name="customerNumber" id="customerNumberInput" value="">

            <div class="presets">
                <button type="button" class="preset-btn active" data-val="60">60 ₽</button>
                <button type="button" class="preset-btn" data-val="100">100 ₽</button>
                <button type="button" class="preset-btn" data-val="150">150 ₽</button>
            </div>

            <div class="amount-input-wrapper">
                <input type="number" id="manualAmount" class="custom-amount" value="60" min="60" step="1">
                <span class="min-sum-hint">Мин. сумма пополнения — 60 ₽</span>
            </div>

            <div class="field-group">
                <label>📧 E-mail для чека</label>
                <input type="email" name="email" class="email-input" placeholder="mail@example.com" required>
            </div>

            <div class="ym-payment-btn-block ym-before-line ym-align-space-between">
                <div class="ym-input-icon-rub">
                    <input name="sum_orig" placeholder="0.00" class="ym-input ym-sum-input ym-required-input" type="number" step="any" value="60">
                </div>
                <button type="submit" class="ym-btn-pay ym-result-price">
                    <span class="ym-text-crop">Оплатить</span>
                    <span class="ym-price-output">60,00&nbsp;₽</span>
                </button>
            </div>

            <button type="button" class="btn-pay" id="customSubmitBtn">💳 Оплатить</button>

            <div class="safe-info">
                <img src="https://yookassa.ru/integration/simplepay/img/iokassa-gray.svg" width="60" alt="ЮKassa">
                <span style="font-size: 11px; color: var(--text-light);">Безопасный платеж</span>
            </div>
        </form>
    </div>

    <script src="https://yookassa.ru/integration/simplepay/js/yookassa_construct_form.js?v=1.34.0"></script>
    <script>
        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');
        const amount = urlParams.get('amount');

        if (userId) {
            // ИСПРАВЛЕНО: name="metadata[user_id]" — именно этот формат ЮKassa передаёт в webhook как payment.metadata.user_id
            document.getElementById('metadataUserIdInput').value = userId;
            // customerNumber — для совместимости (приходит как merchant_customer_id)
            document.getElementById('customerNumberInput').value = userId;
            console.log('✅ Telegram ID установлен:', userId);
        } else {
            console.warn('⚠️ user_id не найден в URL');
        }

        // Если сумма передана из бота — подставляем автоматически
        if (amount) {
            const val = parseInt(amount);
            if (val >= 60) {
                document.getElementById('manualAmount').value = val;
                syncAmount(val);
                // Снимаем активность с пресетов и ставим нужный
                document.querySelectorAll('.preset-btn').forEach(b => {
                    b.classList.remove('active');
                    if (parseInt(b.getAttribute('data-val')) === val) b.classList.add('active');
                });
            }
        }

        const buttons = document.querySelectorAll('.preset-btn');
        const manualInput = document.getElementById('manualAmount');
        const sumInput = document.getElementById('sumInput');
        const priceInput = document.getElementById('priceInput');

        const origSumInput = document.querySelector('.ym-sum-input');
        const origPriceOutput = document.querySelector('.ym-price-output');

        function syncAmount(val) {
            val = parseFloat(val) || 0;
            sumInput.value = val;
            priceInput.value = val;
            if (origSumInput) origSumInput.value = val.toFixed(2);
            if (origPriceOutput) origPriceOutput.innerHTML = val.toFixed(2).replace('.', ',') + '&nbsp;₽';
            if (val < 60) {
                manualInput.classList.add('invalid');
            } else {
                manualInput.classList.remove('invalid');
            }
        }

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const val = parseInt(btn.getAttribute('data-val'));
                manualInput.value = val;
                syncAmount(val);
            });
        });

        manualInput.addEventListener('input', (e) => {
            let val = parseFloat(e.target.value) || 0;
            buttons.forEach(b => b.classList.remove('active'));
            buttons.forEach(b => {
                if (parseInt(b.getAttribute('data-val')) === val) b.classList.add('active');
            });
            syncAmount(val);
        });

        manualInput.addEventListener('blur', function() {
            if (this.value < 60) {
                this.value = 60;
                syncAmount(60);
            }
        });

        document.getElementById('customSubmitBtn').addEventListener('click', function(e) {
            e.preventDefault();

            if (manualInput.value < 60) {
                manualInput.value = 60;
                syncAmount(60);
                alert('Минимальная сумма — 60 рублей');
                return;
            }

            const email = document.querySelector('input[name="email"]').value;
            if (!email || !email.includes('@')) {
                alert('Введите корректный email');
                return;
            }

            if (!document.getElementById('metadataUserIdInput').value) {
                alert('Ошибка: идентификатор пользователя не найден. Перейдите по ссылке из бота.');
                return;
            }

            const originalPayBtn = document.querySelector('.ym-btn-pay');
            if (originalPayBtn) {
                originalPayBtn.click();
            } else {
                document.getElementById('payForm').submit();
            }
        });
    </script>
</body>
</html>
