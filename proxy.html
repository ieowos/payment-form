<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата GetTG</title>
    <link rel="stylesheet" href="https://yookassa.ru/integration/simplepay/css/yookassa_construct_form.css?v=1.34.0">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.05) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(79, 70, 229, 0.05) 0px, transparent 50%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .payment-card {
            background: var(--card-bg);
            max-width: 480px;
            width: 100%;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            padding: 40px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            color: var(--text-main);
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 15px;
            margin: 0;
        }

        /* Стили слайдера */
        .range-container {
            margin-bottom: 32px;
            text-align: center;
        }

        .amount-display {
            font-size: 48px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .amount-display span {
            font-size: 24px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .modern-range {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            outline: none;
            margin: 20px 0;
        }

        .modern-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--primary);
            border: 4px solid white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
            transition: transform 0.2s;
        }

        .modern-range::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        /* Инпуты */
        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .custom-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .custom-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* Кнопка */
        .pay-button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .pay-button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }

        .pay-button:active {
            transform: translateY(0);
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
        }

        .secure-tag {
            font-size: 12px;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
        }

        /* Скрытие лишнего */
        .ym-products, .ym-input-icon-rub, .ym-payment-btn-block { display: none !important; }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="header">
        <h1>Пополнение GetTG</h1>
        <p>Средства зачисляются автоматически</p>
    </div>

    <form class="yoomoney-payment-form" action="https://yookassa.ru/integration/simplepay/payment" method="post">
        
        <div class="range-container">
            <div class="amount-display" id="valDisplay">60 <span>₽</span></div>
            <input type="range" min="60" max="5000" step="10" value="60" class="modern-range" id="amountSlider">
            <div style="display: flex; justify-content: space-between; color: var(--text-muted); font-size: 12px;">
                <span>60 ₽</span>
                <span>5 000 ₽</span>
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Email для чека</label>
            <input class="custom-input" name="email" type="email" placeholder="example@mail.ru" required>
        </div>

        <input type="hidden" name="shopId" value="1301126">
        <input type="hidden" name="sum" id="sumInput" value="60">
        <input type="hidden" name="customerNumber" value="GetTG_Refill">
        
        <div class="ym-products">
            <input type="hidden" name="text" value="Пополнение баланса GetTG">
            <input type="hidden" name="price" id="priceInput" value="60">
            <input type="hidden" name="quantity" value="1">
            <input type="hidden" name="tax" value="1">
        </div>

        <button type="submit" class="pay-button">
            Оплатить пополнение
        </button>

        <div class="footer-info">
            <div class="secure-tag">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Secure
            </div>
            <img src="https://yookassa.ru/integration/simplepay/img/iokassa-gray.svg" width="80" alt="ЮKassa">
        </div>
    </form>
</div>

<script src="https://yookassa.ru/integration/simplepay/js/yookassa_construct_form.js?v=1.34.0"></script>
<script>
    const slider = document.getElementById('amountSlider');
    const valDisplay = document.getElementById('valDisplay');
    const sumInput = document.getElementById('sumInput');
    const priceInput = document.getElementById('priceInput');

    slider.oninput = function() {
        const value = this.value;
        valDisplay.innerHTML = `${value} <span>₽</span>`;
        sumInput.value = value;
        priceInput.value = value;
    }
</script>

</body>
</html>
