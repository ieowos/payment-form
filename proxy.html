<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата GetTG</title>
    <link rel="stylesheet" href="https://yookassa.ru/integration/simplepay/css/yookassa_construct_form.css?v=1.34.0">
    <style>
        :root {
            --accent: #2563eb;
            --error: #ef4444;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --bg-page: #f8fafc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        .payment-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            border-radius: 28px;
            box-shadow: 0 15px 35px -5px rgba(0,0,0,0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 20px;
            color: var(--text-dark);
            margin: 0;
            font-weight: 800;
        }

        .presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .preset-btn {
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: white;
            color: var(--text-dark);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn.active {
            border-color: var(--accent);
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .amount-input-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        .custom-amount {
            width: 100%;
            padding: 16px;
            font-size: 22px;
            font-weight: 700;
            border: 2px solid var(--border);
            border-radius: 16px;
            box-sizing: border-box;
            color: var(--text-dark);
            text-align: center;
        }

        .custom-amount:focus {
            outline: none;
            border-color: var(--accent);
        }

        .custom-amount.invalid {
            border-color: var(--error);
            color: var(--error);
        }

        .min-sum-hint {
            display: block;
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 8px;
            font-weight: 500;
        }

        .field-group {
            margin-bottom: 20px;
        }

        .field-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .email-input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            box-sizing: border-box;
        }

        /* Скрываем родные элементы ЮKassa визуально */
        .ym-products { display: none; }
        .ym-input-icon-rub { display: none; }
        .ym-payment-btn-block {
            position: absolute;
            opacity: 0;
            height: 0;
            overflow: hidden;
            pointer-events: none;
        }

        /* Наша кнопка */
        .btn-pay {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-pay:hover { background: #1d4ed8; }
        .btn-pay:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-msg {
            color: var(--error);
            font-size: 13px;
            text-align: center;
            margin-bottom: 12px;
            display: none;
        }

        .safe-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 24px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <div class="header">
            <h1>💰 Пополнение GetTG</h1>
        </div>

        <form class="yoomoney-payment-form" action="https://yookassa.ru/integration/simplepay/payment" method="post" id="payForm">

            <div class="ym-products">
                <div class="ym-product">
                    <input type="hidden" name="text" value="Пополнение GetTG">
                    <input type="hidden" name="price" id="priceInput" value="60">
                    <input type="hidden" name="quantity" value="1">
                    <input type="hidden" name="paymentSubjectType" value="payment">
                    <input type="hidden" name="paymentMethodType" value="full_prepayment">
                    <input type="hidden" name="tax" value="1">
                </div>
            </div>

            <input type="hidden" name="ym_merchant_receipt" value="">
            <input type="hidden" name="shopId" value="1301126">
            <input type="hidden" name="sum" id="sumInput" value="60">

            <!-- metadata[user_id] — правильный формат для ЮKassa SimplePay webhook -->
            <input type="hidden" name="metadata[user_id]" id="metadataUserIdInput" value="">
            <input type="hidden" name="customerNumber" id="customerNumberInput" value="">

            <!-- Скрытый блок для ЮKassa JS — он ищет эти классы -->
            <div class="ym-payment-btn-block ym-before-line ym-align-space-between">
                <div class="ym-input-icon-rub">
                    <input name="sum_orig" class="ym-input ym-sum-input ym-required-input" type="number" step="any" value="60">
                </div>
                <button type="submit" class="ym-btn-pay ym-result-price" id="ymSubmitBtn">
                    <span class="ym-text-crop">Оплатить</span>
                    <span class="ym-price-output">60,00&nbsp;₽</span>
                </button>
            </div>

            <!-- Выбор суммы -->
            <div class="presets">
                <button type="button" class="preset-btn active" data-val="60">60 ₽</button>
                <button type="button" class="preset-btn" data-val="100">100 ₽</button>
                <button type="button" class="preset-btn" data-val="150">150 ₽</button>
            </div>

            <div class="amount-input-wrapper">
                <input type="number" id="manualAmount" class="custom-amount" value="60" min="60" step="1">
                <span class="min-sum-hint">Мин. сумма пополнения — 60 ₽</span>
            </div>

            <div class="field-group">
                <label>📧 E-mail для чека</label>
                <input type="email" name="email" id="emailInput" class="email-input" placeholder="mail@example.com">
            </div>

            <div class="error-msg" id="errorMsg"></div>

            <!-- type="submit" — ЮKassa JS перехватит это событие сам -->
            <button type="submit" class="btn-pay" id="customSubmitBtn">💳 Оплатить</button>

            <div class="safe-info">
                <img src="https://yookassa.ru/integration/simplepay/img/iokassa-gray.svg" width="60" alt="ЮKassa">
                <span style="font-size: 11px; color: var(--text-light);">Безопасный платеж</span>
            </div>
        </form>
    </div>

    <script src="https://yookassa.ru/integration/simplepay/js/yookassa_construct_form.js?v=1.34.0"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');
        const amountParam = urlParams.get('amount');

        if (userId) {
            document.getElementById('metadataUserIdInput').value = userId;
            document.getElementById('customerNumberInput').value = userId;
        }

        const manualInput = document.getElementById('manualAmount');
        const sumInput = document.getElementById('sumInput');
        const priceInput = document.getElementById('priceInput');
        const origSumInput = document.querySelector('.ym-sum-input');
        const origPriceOutput = document.querySelector('.ym-price-output');
        const buttons = document.querySelectorAll('.preset-btn');

        function syncAmount(val) {
            val = parseFloat(val) || 0;
            sumInput.value = val;
            priceInput.value = val;
            if (origSumInput) origSumInput.value = val.toFixed(2);
            if (origPriceOutput) origPriceOutput.innerHTML = val.toFixed(2).replace('.', ',') + '&nbsp;₽';
            manualInput.classList.toggle('invalid', val < 60);
        }

        // Подставляем сумму из URL если передана
        if (amountParam) {
            const val = parseInt(amountParam);
            if (val >= 60) {
                manualInput.value = val;
                syncAmount(val);
                buttons.forEach(b => {
                    b.classList.toggle('active', parseInt(b.getAttribute('data-val')) === val);
                });
            }
        }

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                syncAmount(parseInt(btn.getAttribute('data-val')));
                manualInput.value = parseInt(btn.getAttribute('data-val'));
            });
        });

        manualInput.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value) || 0;
            buttons.forEach(b => {
                b.classList.toggle('active', parseInt(b.getAttribute('data-val')) === val);
            });
            syncAmount(val);
        });

        manualInput.addEventListener('blur', function () {
            if (this.value < 60) { this.value = 60; syncAmount(60); }
        });

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        // Валидация на submit — ПЕРЕД тем как ЮKassa JS обработает форму
        document.getElementById('payForm').addEventListener('submit', function (e) {
            const amount = parseFloat(manualInput.value) || 0;
            const email = document.getElementById('emailInput').value;
            const uid = document.getElementById('metadataUserIdInput').value;

            if (amount < 60) {
                e.preventDefault();
                e.stopImmediatePropagation();
                manualInput.value = 60;
                syncAmount(60);
                showError('Минимальная сумма — 60 ₽');
                return;
            }

            if (!email || !email.includes('@')) {
                e.preventDefault();
                e.stopImmediatePropagation();
                showError('Введите корректный email');
                return;
            }

            if (!uid) {
                e.preventDefault();
                e.stopImmediatePropagation();
                showError('Ошибка: перейдите по ссылке из бота');
                return;
            }

            // Всё ок — ЮKassa JS сам перехватит submit и откроет форму оплаты
        }, true); // true = capture phase, срабатывает ДО обработчиков ЮKassa
    </script>
</body>
</html>
