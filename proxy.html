<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата GetTG</title>
    <style>
        :root {
            --accent: #2563eb;
            --error: #ef4444;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --bg-page: #f8fafc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            border-radius: 28px;
            box-shadow: 0 15px 35px -5px rgba(0,0,0,0.08);
        }
        h1 { font-size: 20px; font-weight: 800; color: var(--text-dark); text-align: center; margin: 0 0 28px; }
        .presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .preset-btn {
            padding: 12px; border: 2px solid var(--border); border-radius: 12px;
            background: white; color: var(--text-dark); font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .preset-btn.active { border-color: var(--accent); background: var(--accent); color: white; }
        .amount-wrap { margin-bottom: 24px; }
        .amount-input {
            width: 100%; padding: 16px; font-size: 22px; font-weight: 700;
            border: 2px solid var(--border); border-radius: 16px; box-sizing: border-box;
            color: var(--text-dark); text-align: center;
        }
        .amount-input:focus { outline: none; border-color: var(--accent); }
        .amount-input.invalid { border-color: var(--error); color: var(--error); }
        .hint { display: block; text-align: center; font-size: 12px; color: var(--text-light); margin-top: 8px; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-light); margin-bottom: 6px; }
        .email-input {
            width: 100%; padding: 14px; border: 2px solid var(--border);
            border-radius: 14px; font-size: 16px; box-sizing: border-box;
        }
        .btn-pay {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 18px; border-radius: 16px; font-size: 17px; font-weight: 700; cursor: pointer;
        }
        .btn-pay:hover { background: #1d4ed8; }
        .safe { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 24px; opacity: 0.5; }
        .safe span { font-size: 11px; color: var(--text-light); }
        #error-msg { color: var(--error); font-size: 13px; text-align: center; margin-top: 12px; display: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>💰 Пополнение GetTG</h1>

    <!--
        ВАЖНО: форма отправляется напрямую в YooKassa Simplepay.
        user_id передаётся в поле label — оно попадает в description платежа,
        откуда webhook его читает.
    -->
    <form id="payForm" action="https://yookassa.ru/integration/simplepay/payment" method="POST">
        <!-- Обязательные поля Simplepay -->
        <input type="hidden" name="shopId" value="1301126">
        <input type="hidden" name="sum" id="sumField" value="60">

        <!--
            label попадает в payment.description в webhook.
            Формат: "GetTG|USER_ID" — парсим по разделителю "|"
        -->
        <input type="hidden" name="label" id="labelField" value="">

        <!-- Чек -->
        <input type="hidden" name="quickpay-form" value="shop">
        <input type="hidden" name="targets" value="Пополнение GetTG">
        <input type="hidden" name="paymentType" value="AC">

        <div class="presets">
            <button type="button" class="preset-btn active" data-val="60">60 ₽</button>
            <button type="button" class="preset-btn" data-val="100">100 ₽</button>
            <button type="button" class="preset-btn" data-val="150">150 ₽</button>
        </div>

        <div class="amount-wrap">
            <input type="number" id="amountInput" class="amount-input" value="60" min="60" step="1">
            <span class="hint">Мин. сумма пополнения — 60 ₽</span>
        </div>

        <div class="field">
            <label>📧 E-mail для чека</label>
            <input type="email" name="email" class="email-input" placeholder="mail@example.com" required>
        </div>

        <button type="button" class="btn-pay" id="payBtn">💳 Оплатить</button>
        <div id="error-msg"></div>
    </form>

    <div class="safe">
        <img src="https://yookassa.ru/integration/simplepay/img/iokassa-gray.svg" width="60" alt="ЮKassa">
        <span>Безопасный платёж</span>
    </div>
</div>

<script>
    // Читаем user_id из URL (?user_id=123456789)
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id');

    if (userId) {
        // Передаём в label в формате "GetTG|USER_ID"
        // В webhook читаем: payment.description → парсим после "|"
        document.getElementById('labelField').value = `GetTG|${userId}`;
    }

    // Пресеты
    document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const val = btn.getAttribute('data-val');
            document.getElementById('amountInput').value = val;
            document.getElementById('sumField').value = val;
        });
    });

    document.getElementById('amountInput').addEventListener('input', function() {
        document.getElementById('sumField').value = this.value;
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.preset-btn').forEach(b => {
            if (b.getAttribute('data-val') === this.value) b.classList.add('active');
        });
        this.classList.toggle('invalid', parseFloat(this.value) < 60);
    });

    document.getElementById('amountInput').addEventListener('blur', function() {
        if (parseFloat(this.value) < 60) {
            this.value = 60;
            document.getElementById('sumField').value = 60;
            this.classList.remove('invalid');
        }
    });

    // Кнопка оплаты
    document.getElementById('payBtn').addEventListener('click', function() {
        const errEl = document.getElementById('error-msg');
        errEl.style.display = 'none';

        const amount = parseFloat(document.getElementById('amountInput').value);
        if (amount < 60) {
            errEl.textContent = 'Минимальная сумма — 60 рублей';
            errEl.style.display = 'block';
            return;
        }

        const email = document.querySelector('input[name="email"]').value;
        if (!email || !email.includes('@')) {
            errEl.textContent = 'Введите корректный email';
            errEl.style.display = 'block';
            return;
        }

        if (!userId) {
            errEl.textContent = 'Ошибка: перейдите по ссылке из бота';
            errEl.style.display = 'block';
            return;
        }

        document.getElementById('payForm').submit();
    });
</script>
</body>
</html>
